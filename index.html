let state = {
  lang: null,
  name: "", groupName: "", currentStation: 0,
  totalPoints: 0, answers: [], startTime: null, finished: false

function saveState() {
  try { localStorage.setItem('greetsiel-rallye', JSON.stringify(state)); } catch(e) {}
}
function loadState() {
  try {
    const saved = localStorage.getItem('greetsiel-rallye');
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
}
function resetState() {
  const t = state.lang ? UI[state.lang] : UI.de;
  if (confirm(t.resetConfirm)) {
    localStorage.removeItem('greetsiel-rallye');
    state = { lang: null, name: "", groupName: "", currentStation: 0, totalPoints: 0, answers: [], startTime: null, finished: false };
    render();
  }
}
function changeLang() {
  state.lang = null;
  saveState();
  render();
}

const app = document.getElementById('app');

function render() {
  if (!state.lang) renderLangChoice();
  else if (!state.startTime || !state.name) renderStart();
  else if (state.finished || state.currentStation >= STATIONEN[state.lang].length) renderFinal();
  else renderStation();
}

function selectLang(lang) {
  state.lang = lang;
  document.documentElement.lang = lang;
  saveState();
  render();
}

function renderLangChoice() {
  app.innerHTML = `
    <div class="lang-screen">
      <div class="lang-emoji">🦐</div>
      <h1 class="lang-title">${UI.de.chooseLang} / ${UI.it.chooseLang} / ${UI.es.chooseLang}</h1>
      <div class="lang-subtitle">Greetsiel-Rallye · Mariengymnasium Papenburg</div>

      <button class="lang-btn" onclick="selectLang('de')">
        <span class="lang-flag">🇩🇪</span>
        <span class="lang-name">Deutsch</span>
        <span class="lang-arrow">›</span>
      </button>
      <button class="lang-btn" onclick="selectLang('it')">
        <span class="lang-flag">🇮🇹</span>
        <span class="lang-name">Italiano</span>
        <span class="lang-arrow">›</span>
      </button>
      <button class="lang-btn" onclick="selectLang('es')">
        <span class="lang-flag">🇪🇸</span>
        <span class="lang-name">Español</span>
        <span class="lang-arrow">›</span>
      </button>
    </div>
  `;
}

function renderStart() {
  const t = UI[state.lang];
  app.innerHTML = `
    <div class="start-screen">
      <div class="start-emoji">🦐</div>
      <h1 class="start-title">${t.title}</h1>
      <div class="start-subtitle">${t.subtitle}</div>

      <div class="start-card">
        <h3>${t.howWorks}</h3>
        <ul>
          ${t.rulesItems.map(li => `<li>${li}</li>`).join('')}
        </ul>
      </div>

      <div class="start-card">
        <h3>${t.rules}</h3>
        <ul>
          ${t.rulesPlay.map(li => `<li>${li}</li>`).join('')}
        </ul>
      </div>

      <input type="text" class="name-input" id="player-name" placeholder="${t.namePlaceholder}" maxlength="50">
      <input type="text" class="name-input" id="group-name" placeholder="${t.groupPlaceholder}" maxlength="30">

      <button class="btn-primary" onclick="startRallye()">${t.startBtn}</button>
      <div class="lang-switch-link" onclick="changeLang()">🌐 ${t.changeLang}</div>
    </div>
  `;
}

function startRallye() {
  const nameInput = document.getElementById('player-name');
  const groupInput = document.getElementById('group-name');
  const name = nameInput.value.trim();
  if (!name) {
    nameInput.style.borderColor = '#feb2b2';
    nameInput.focus();
    return;
  }
  state.name = name;
  state.groupName = groupInput.value.trim();
  state.startTime = Date.now();
  state.currentStation = 0;
  saveState();
  render();
}

function renderStation() {
  const t = UI[state.lang];
  const stations = STATIONEN[state.lang];
  const s = stations[state.currentStation];
  const progress = ((state.currentStation) / stations.length) * 100;

  let aufgabeHtml = '';
  if (s.type === 'quiz') {
    aufgabeHtml = `
      <div class="multi-choice" id="choices">
        ${s.choices.map((c, i) => `
          <button class="choice-btn" onclick="selectChoice(${i})" data-idx="${i}">${c}</button>
        `).join('')}
      </div>
      <button class="btn-primary" style="margin-top:14px" onclick="checkQuiz()">${t.checkAnswer}</button>
    `;
  } else if (s.type === 'code') {
    aufgabeHtml = `
      <input type="text" class="answer-input" id="code-answer" placeholder="${t.answerPlaceholder}" autocapitalize="off" autocomplete="off">
      <button class="btn-primary" style="margin-top:12px" onclick="checkCode()">${t.checkAnswer}</button>
    `;
  } else if (s.type === 'photo') {
    aufgabeHtml = `
      <label class="photo-upload" id="photo-label">
        <input type="file" accept="image/*" capture="environment" id="photo-input" onchange="handlePhoto(event)">
        <div class="photo-icon">📸</div>
        <div class="photo-text">${t.photoTap}</div>
      </label>
      <button class="btn-primary" style="margin-top:14px; opacity:0.5" id="photo-submit" disabled onclick="submitPhoto()">${t.confirmPhoto}</button>
    `;
  }

  app.innerHTML = `
    <div class="topbar">
      <div class="progress">${t.stationOf} ${state.currentStation + 1} / ${stations.length}</div>
      <div class="points">${state.totalPoints} ${t.pts}</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${progress}%"></div>
    </div>

    <div class="hint-card">
      <div class="hint-label">${t.hintLabel}</div>
      <div class="hint-text">${s.hint}</div>
    </div>

    <div class="question-card">
      <div class="task-type">${s.typeLabel} · ${s.points} ${t.points}</div>
      <h2 class="station-title">${s.title}</h2>
      <div class="task-text">${s.task}</div>
      <div id="feedback-area"></div>
      <div id="task-area">${aufgabeHtml}</div>
    </div>

    <div class="skip-link" onclick="resetState()">${t.resetRally}</div>
  `;
}

let currentChoice = -1;
let currentPhoto = null;

function selectChoice(idx) {
  currentChoice = idx;
  document.querySelectorAll('.choice-btn').forEach((b, i) => {
    b.classList.toggle('selected', i === idx);
  });
}

function checkQuiz() {
  const t = UI[state.lang];
  const stations = STATIONEN[state.lang];
  const s = stations[state.currentStation];
  if (currentChoice === -1) {
    showFeedback(t.chooseAnswer, false);
    return;
  }
  if (currentChoice === s.correct) {
    onCorrect(s);
  } else {
    state.totalPoints = Math.max(0, state.totalPoints - 10);
    saveState();
    showFeedback(t.wrongQuiz, false);
    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
    currentChoice = -1;
    updatePoints();
  }
}

function checkCode() {
  const t = UI[state.lang];
  const stations = STATIONEN[state.lang];
  const s = stations[state.currentStation];
  const inp = document.getElementById('code-answer');
  const val = (inp.value || '').trim().toLowerCase();
  if (!val) {
    showFeedback(t.enterAnswer, false);
    return;
  }
  const correct = String(s.answer).toLowerCase();
  if (val === correct) {
    onCorrect(s);
  } else {
    state.totalPoints = Math.max(0, state.totalPoints - 10);
    saveState();
    showFeedback(t.wrongCode, false);
    updatePoints();
  }
}

function handlePhoto(e) {
  const t = UI[state.lang];
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    currentPhoto = ev.target.result;
    const label = document.getElementById('photo-label');
    label.classList.add('has-photo');
    label.innerHTML = `
      <input type="file" accept="image/*" capture="environment" id="photo-input" onchange="handlePhoto(event)">
      <img src="${currentPhoto}" class="photo-preview">
      <div class="photo-text" style="margin-top:10px">${t.photoTaken}</div>
    `;
    const btn = document.getElementById('photo-submit');
    btn.disabled = false;
    btn.style.opacity = '1';
  };
  reader.readAsDataURL(file);
}

function submitPhoto() {
  const t = UI[state.lang];
  const stations = STATIONEN[state.lang];
  const s = stations[state.currentStation];
  if (!currentPhoto) {
    showFeedback(t.takePhotoFirst, false);
    return;
  }
  onCorrect(s);
}

function onCorrect(s) {
  const t = UI[state.lang];
  const stations = STATIONEN[state.lang];
  state.totalPoints += s.points;
  state.answers.push({ station: s.nr, title: s.title, points: s.points });

  document.getElementById('task-area').innerHTML = `
    <div class="reveal-card">
      <div class="reveal-label">${t.correctLabel}${s.points} ${t.points}</div>
      <div class="reveal-text">${s.reveal}</div>
    </div>
    <button class="btn-primary" onclick="nextStation()">
      ${state.currentStation + 1 >= stations.length ? t.finishRally : t.nextStation}
    </button>
  `;
  document.getElementById('feedback-area').innerHTML = '';
  currentChoice = -1;
  currentPhoto = null;
  saveState();
  updatePoints();
}

function nextStation() {
  const stations = STATIONEN[state.lang];
  state.currentStation++;
  if (state.currentStation >= stations.length) state.finished = true;
  saveState();
  render();
  window.scrollTo(0, 0);
}

function showFeedback(msg, ok) {
  const area = document.getElementById('feedback-area');
  area.innerHTML = `<div class="feedback ${ok ? 'correct' : 'wrong'}">${msg}</div>`;
}

function updatePoints() {
  const t = UI[state.lang];
  const pointsEl = document.querySelector('.points');
  if (pointsEl) pointsEl.textContent = state.totalPoints + ' ' + t.pts;
}

function renderFinal() {
  const t = UI[state.lang];
  const stations = STATIONEN[state.lang];
  const dauer = Math.round((Date.now() - state.startTime) / 60000);
  const maxPunkte = stations.reduce((sum, s) => sum + s.points, 0);
  const prozent = Math.round((state.totalPoints / maxPunkte) * 100);

  let bewertung = "";
  if (prozent >= 90) bewertung = t.excellent;
  else if (prozent >= 75) bewertung = t.veryGood;
  else if (prozent >= 60) bewertung = t.good;
  else bewertung = t.completed;

  app.innerHTML = `
    <div class="final-screen">
      <div class="final-emoji">⚓</div>
      <h1 class="final-title">${bewertung}</h1>
      <div class="final-name">${state.name}${state.groupName ? ' · ' + state.groupName : ''}</div>

      <div class="final-score-card">
        <div class="final-points">${state.totalPoints}</div>
        <div class="final-points-label">${t.ofPoints} ${maxPunkte} ${t.pointsLabel}</div>
        <div class="final-stats">
          <div><span class="final-stat-num">${stations.length}</span>${t.stations}</div>
          <div><span class="final-stat-num">${dauer}</span>${t.minutes}</div>
          <div><span class="final-stat-num">${prozent}%</span>${t.achieved}</div>
        </div>
      </div>

      <div class="final-quote">"${t.finalQuote}"</div>

      <button class="btn-primary" onclick="shareResult()">${t.shareResult}</button>
      <button class="btn-secondary" onclick="resetState()">${t.newRally}</button>

      <div class="footer-note">
        ${t.showTeacher}<br>
        ${t.school}
      </div>
    </div>
  `;
}

function shareResult() {
  const t = UI[state.lang];
  const stations = STATIONEN[state.lang];
  const maxPunkte = stations.reduce((sum, s) => sum + s.points, 0);
  const text = `${t.shareIntro}\n\n${state.name}${state.groupName ? ' (' + state.groupName + ')' : ''}\n${state.totalPoints} / ${maxPunkte} ${t.sharePoints}\n${stations.length} ${t.shareStations}`;

  if (navigator.share) {
    navigator.share({ title: t.shareTitle, text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
    alert(t.sharedToClipboard);
  } else {
    alert(text);
  }
}

loadState();
render();
</script>

</body>
</html>
